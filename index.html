<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Homepage</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* Header */

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

header h1{
    margin:0;
}

/* Foto grid */

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:15px;
    padding:30px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Footer */

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>
<body>

<header>
<h1>Mijn Foto Website</h1>
<p>Welkom op mijn homepage</p>
</header>

<section class="gallery">

<img src="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?4">
<img src="https://picsum.photos/400/300?5">
<img src="https://picsum.photos/400/300?6">
<img src="https://picsum.photos/400/300?7">
<img src="https://picsum.photos/400/300?8">

</section>

<footer>
<p>© 2026 Mijn Website</p>
</footer>

</body>
</html>
